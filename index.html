<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA DESIGN PRO - Générateur par IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0000 0%, #000000 100%);
            color: #ff0000;
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0000;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(20, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #ff8888;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff0000;
            border-radius: 8px;
            color: white;
            font-family: 'Orbitron', monospace;
        }

        button {
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'Orbitron', monospace;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-area img {
            max-width: 100%;
            border-radius: 15px;
            border: 2px solid #ff0000;
        }

        .gallery-section {
            margin-top: 50px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-card {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }

        .gallery-card img {
            width: 100%;
            border-radius: 8px;
        }

        .delete-btn {
            background: #ff0000;
            margin-top: 10px;
            width: auto;
            padding: 5px 10px;
            font-size: 11px;
        }

        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #ff0000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">🤖 IA DESIGN PRO 🤖</div>
            <h1>INFO PURGE 24</h1>
            <div style="color: #ff6666; font-size: 12px; margin-top: 10px;">Génération par IA - Gratuit - Qualité pro</div>
        </div>

        <div class="card">
            <div class="input-group">
                <label>🎨 DÉCRIVEZ VOTRE DESIGN</label>
                <textarea id="prompt" rows="4" placeholder="Ex: Logo pour un clan sombre avec une épée enflammée et une couronne, style néon rouge, fond noir"></textarea>
            </div>

            <div class="input-group">
                <label>🎨 STYLE (optionnel)</label>
                <select id="style">
                    <option value="">🎨 Aucun (IA choisit)</option>
                    <option value="cinematic">🎬 Cinématique</option>
                    <option value="3d">💎 3D réaliste</option>
                    <option value="anime">🌸 Anime / Manga</option>
                    <option value="dark">💀 Dark / Sombre</option>
                    <option value="neon">⚡ Néon / Cyberpunk</option>
                </select>
            </div>

            <button onclick="genererIA()">✨ GÉNÉRER AVEC IA ✨</button>
        </div>

        <div id="resultat" class="result-area">
            <div style="text-align: center; color: #666;">
                <div style="font-size: 48px;">🤖</div>
                <p>Votre design IA apparaîtra ici</p>
            </div>
        </div>

        <div class="gallery-section">
            <h2>📚 HISTORIQUE</h2>
            <div class="gallery-grid" id="gallery-grid">
                <p style="color: #666;">Aucun design généré</p>
            </div>
        </div>
    </div>

    <script>
        let historique = [];

        function genererIA() {
            let prompt = document.getElementById('prompt').value;
            const style = document.getElementById('style').value;
            
            if(!prompt) {
                alert("❌ Décrivez votre design !");
                return;
            }
            
            // Ajouter le style au prompt
            const styleMap = {
                cinematic: "style cinématique, éclairage dramatique, qualité cinéma",
                "3d": "style 3D réaliste, rendu professionnel, octane render",
                anime: "style anime japonais, couleurs vives, illustration manga",
                dark: "style sombre, gothique, ambiance mystérieuse, ténèbres",
                neon: "style néon cyberpunk, lumières colorées, futuriste"
            };
            
            let promptComplet = prompt;
            if(style && styleMap[style]) {
                promptComplet = `${prompt}, ${styleMap[style]}`;
            }
            
            document.getElementById('resultat').innerHTML = `
                <div style="text-align: center;">
                    <div class="loading"></div>
                    <p style="margin-top: 15px;">Génération IA en cours... (10-20 secondes)</p>
                </div>
            `;
            
            fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptComplet })
            })
            .then(res => res.json())
            .then(data => {
                if(data.imageUrl) {
                    afficherResultat(data.imageUrl, prompt);
                    sauvegarderHistorique(data.imageUrl, prompt);
                } else {
                    throw new Error("Pas d'image reçue");
                }
            })
            .catch(erreur => {
                console.error(erreur);
                document.getElementById('resultat').innerHTML = `
                    <div style="text-align: center; color: #ff6666;">
                        <div style="font-size: 48px;">⚠️</div>
                        <p>Erreur de génération. Réessaie dans quelques secondes.</p>
                        <p style="font-size: 11px;">Le service peut être saturé, réessaie plus tard.</p>
                    </div>
                `;
            });
        }
        
        function afficherResultat(imageUrl, prompt) {
            document.getElementById('resultat').innerHTML = `
                <div style="text-align: center;">
                    <img src="${imageUrl}" style="max-width: 100%; border-radius: 15px; margin-bottom: 15px;">
                    <div>
                        <button class="delete-btn" onclick="telechargerImage('${imageUrl}')">📥 Télécharger</button>
                    </div>
                    <p style="font-size: 10px; margin-top: 10px; color: #666;">Généré par IA - ${prompt.substring(0, 50)}...</p>
                </div>
            `;
        }
        
        function telechargerImage(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = 'design-ia.png';
            link.click();
        }
        
        function sauvegarderHistorique(imageUrl, prompt) {
            const id = Date.now();
            historique.unshift({ id, imageUrl, prompt, date: new Date().toLocaleString() });
            if(historique.length > 20) historique.pop();
            localStorage.setItem('ia_historique', JSON.stringify(historique));
            afficherHistorique();
        }
        
        function afficherHistorique() {
            const grid = document.getElementById('gallery-grid');
            if(historique.length === 0) {
                grid.innerHTML = '<p style="color: #666;">Aucun design généré</p>';
                return;
            }
            grid.innerHTML = historique.map(item => `
                <div class="gallery-card" onclick="afficherImage('${item.imageUrl}')">
                    <img src="${item.imageUrl}" style="width: 100%;">
                    <div style="font-size: 10px; margin-top: 5px;">${item.date}</div>
                    <button class="delete-btn" onclick="event.stopPropagation(); supprimerHistorique(${item.id})">🗑</button>
                </div>
            `).join('');
        }
        
        function afficherImage(url) {
            document.getElementById('resultat').innerHTML = `
                <div style="text-align: center;">
                    <img src="${url}" style="max-width: 100%; border-radius: 15px;">
                    <button class="delete-btn" onclick="telechargerImage('${url}')" style="margin-top: 10px;">📥 Télécharger</button>
                </div>
            `;
        }
        
        function supprimerHistorique(id) {
            historique = historique.filter(item => item.id !== id);
            localStorage.setItem('ia_historique', JSON.stringify(historique));
            afficherHistorique();
        }
        
        // Charger l'historique
        const saved = localStorage.getItem('ia_historique');
        if(saved) {
            historique = JSON.parse(saved);
            afficherHistorique();
        }
    </script>
</body>
</html>
