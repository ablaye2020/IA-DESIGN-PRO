<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURGE DESIGN PRO - Créateur visuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0000 0%, #000000 100%);
            color: #ff0000;
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0000;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #ff4444;
            font-size: 14px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(20, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 25px;
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 20px;
            border-left: 3px solid #ff0000;
            padding-left: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #ff8888;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff0000;
            border-radius: 8px;
            color: white;
            font-family: 'Orbitron', monospace;
        }

        button {
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'Orbitron', monospace;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .design-preview {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-save, .btn-download {
            background: #00aa00;
            margin: 5px;
            width: auto;
            padding: 10px 20px;
        }

        .btn-download {
            background: #0066cc;
        }

        .gallery-section {
            margin-top: 50px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-card {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .delete-btn {
            background: #ff0000;
            margin-top: 10px;
            width: auto;
            padding: 5px 10px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">⚔️ PURGE DESIGN PRO ⚔️</div>
            <h1>INFO PURGE 24</h1>
            <div class="subtitle">Créez des bannières, logos et récompenses pour la communauté</div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>🎨 CRÉER UN DESIGN</h2>
                
                <div class="input-group">
                    <label>📋 TYPE DE DESIGN</label>
                    <select id="type">
                        <option value="banniere_clan">🏆 Bannière de clan</option>
                        <option value="carte_purgeur">👑 Carte de purgeur</option>
                        <option value="affiche_info">📰 Affiche INFO PURGE</option>
                        <option value="logo_sombre">💀 Logo sombre</option>
                        <option value="fleur_sombre">🌸 Fleur sauvage / Sombre</option>
                        <option value="recompense_premium">🏅 Récompense Premium</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>📝 NOM / TEXTE PRINCIPAL</label>
                    <input type="text" id="nom" placeholder="Ex: LES SEPTSOMBRES, Fleur sauvagesaori, LA PERFECTION">
                </div>

                <div class="input-group">
                    <label>🏷️ SOUS-TITRE (optionnel)</label>
                    <input type="text" id="soustitre" placeholder="Ex: MEILLEUR PURGEUR, Âme sauvage, Ban or spam">
                </div>

                <div class="input-group">
                    <label>🎨 COULEUR PRINCIPALE</label>
                    <input type="color" id="couleur" value="#ff0000">
                </div>

                <div class="input-group">
                    <label>📊 STATISTIQUES / PRIX (optionnel)</label>
                    <input type="text" id="stats" placeholder="Ex: KILLS: 2650 | 10000 LVL 1">
                </div>

                <button onclick="genererDesignPurge()">⚔️ GÉNÉRER LE DESIGN ⚔️</button>
            </div>

            <div class="card">
                <h2>🖼️ APERÇU</h2>
                <div id="resultat" class="result-area">
                    <div style="text-align: center; color: #666;">
                        <div style="font-size: 48px;">⚔️</div>
                        <p>Cliquez sur "Générer"<br>pour créer votre design PURGE</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="gallery-section">
            <h2>📚 MES CRÉATIONS PURGE</h2>
            <div class="gallery-grid" id="gallery-grid">
                <p style="color: #666;">Aucune création sauvegardée</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        let designsSauvegardes = [];

        function genererDesignPurge() {
            const type = document.getElementById('type').value;
            let nom = document.getElementById('nom').value;
            const soustitre = document.getElementById('soustitre').value;
            const couleur = document.getElementById('couleur').value;
            const stats = document.getElementById('stats').value;
            
            if(!nom) nom = "PURGEUR";
            
            let designHTML = "";
            let largeur = 500;
            let hauteur = 400;
            
            if(type === "banniere_clan") {
                hauteur = 250;
                designHTML = `
                    <div style="background: linear-gradient(135deg, #000000, ${couleur}); width: ${largeur}px; height: ${hauteur}px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; border: 2px solid ${couleur}; box-shadow: 0 0 30px ${couleur};">
                        <div style="font-size: 48px; margin-bottom: 10px;">⚔️</div>
                        <div style="font-size: 28px; font-weight: bold; letter-spacing: 3px;">${nom}</div>
                        <div style="font-size: 14px; margin-top: 10px; color: ${couleur};">${soustitre || "CLAN D'ÉLITE"}</div>
                        <div style="font-size: 11px; margin-top: 15px;">INFO PURGE 24 | OFFICIEL</div>
                    </div>
                `;
            }
            
            if(type === "carte_purgeur") {
                hauteur = 320;
                designHTML = `
                    <div style="background: linear-gradient(135deg, #0a0a0a, #1a0000); width: ${largeur}px; height: ${hauteur}px; border: 2px solid ${couleur}; border-radius: 15px; padding: 20px; position: relative;">
                        <div style="position: absolute; top: 10px; right: 15px; font-size: 12px; color: ${couleur};">#PURGE</div>
                        <div style="text-align: center; margin-top: 20px;">
                            <div style="font-size: 40px;">👑</div>
                            <div style="font-size: 24px; font-weight: bold; margin: 10px 0;">${nom}</div>
                            <div style="font-size: 12px; color: ${couleur};">${soustitre || "PURGEUR D'ÉLITE"}</div>
                            <div style="border-top: 1px solid ${couleur}; margin: 15px 0; padding-top: 10px; font-size: 11px;">${stats || "⚔️ KILLS: 2650 | 💀 DMG: 1637"}</div>
                            <div style="font-size: 10px; margin-top: 10px;">ID: 7483121851 | LVL 7.3</div>
                        </div>
                    </div>
                `;
            }
            
            if(type === "affiche_info") {
                hauteur = 500;
                designHTML = `
                    <div style="background: linear-gradient(135deg, #000000, ${couleur}); width: ${largeur}px; height: ${hauteur}px; border: 3px solid ${couleur}; border-radius: 20px; padding: 20px; text-align: center;">
                        <div style="font-size: 14px; color: ${couleur}; letter-spacing: 2px;">INFO PURGE 24</div>
                        <div style="font-size: 32px; font-weight: bold; margin: 20px 0; text-transform: uppercase;">${nom}</div>
                        <div style="border: 1px solid ${couleur}; margin: 15px 0;"></div>
                        <div style="font-size: 18px; margin: 15px 0;">${soustitre || "ÉVÉNEMENT SPÉCIAL"}</div>
                        <div style="font-size: 12px; margin-top: 20px;">"Le respect ne se demande pas" - Joyboy</div>
                        <div style="margin-top: 30px;">
                            <div style="display: inline-block; background: ${couleur}; color: black; padding: 5px 15px; border-radius: 20px;">PURGE</div>
                        </div>
                    </div>
                `;
            }
            
            if(type === "logo_sombre") {
                hauteur = 400;
                designHTML = `
                    <div style="background: #000000; width: ${largeur}px; height: ${hauteur}px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 50%; border: 3px solid ${couleur}; box-shadow: 0 0 40px ${couleur};">
                        <div style="font-size: 60px;">💀</div>
                        <div style="font-size: 24px; font-weight: bold; margin-top: 15px; letter-spacing: 3px;">${nom}</div>
                        <div style="font-size: 10px; margin-top: 10px; color: ${couleur};">INFO PURGE 24</div>
                    </div>
                `;
            }
            
            if(type === "fleur_sombre") {
                hauteur = 450;
                const couleurFleur = couleur === "#ff0000" ? "#ff69b4" : couleur;
                designHTML = `
                    <div style="background: linear-gradient(135deg, #0a0a0a, #1a0033); width: ${largeur}px; height: ${hauteur}px; border: 2px solid ${couleurFleur}; border-radius: 30px; padding: 20px; text-align: center; box-shadow: 0 0 30px ${couleurFleur}; position: relative;">
                        <div style="position: absolute; top: 10px; right: 15px; font-size: 20px;">🌸</div>
                        <div style="margin-top: 40px;">
                            <div style="font-size: 60px;">🌹</div>
                            <div style="font-size: 28px; font-weight: bold; margin: 15px 0; color: ${couleurFleur}; text-shadow: 0 0 10px ${couleurFleur};">${nom}</div>
                            <div style="font-size: 14px; color: #ff99cc; margin: 10px 0;">${soustitre || "Âme sauvage, cœur pur"}</div>
                            <div style="border-top: 1px dashed ${couleurFleur}; margin: 20px 0; width: 80%; margin-left: auto; margin-right: auto;"></div>
                            <div style="font-size: 11px; color: ${couleurFleur};">${stats || "INFO PURGE 24"}</div>
                        </div>
                    </div>
                `;
            }
            
            if(type === "recompense_premium") {
                hauteur = 500;
                const couleurOr = "#FFD700";
                designHTML = `
                    <div style="background: linear-gradient(135deg, #1a1a00, #000000); width: ${largeur}px; height: ${hauteur}px; border: 3px solid ${couleurOr}; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 40px ${couleurOr}; position: relative;">
                        <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: ${couleurOr}; color: black; padding: 5px 20px; border-radius: 20px; font-size: 12px; font-weight: bold;">🏆 PRIME D'EXCELLENCE 🏆</div>
                        <div style="margin-top: 50px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">👑</div>
                            <div style="font-size: 32px; font-weight: bold; color: ${couleurOr}; text-shadow: 0 0 15px ${couleurOr}; letter-spacing: 2px;">${nom}</div>
                            <div style="font-size: 16px; color: ${couleurOr}; margin: 15px 0; background: rgba(255,215,0,0.1); display: inline-block; padding: 5px 20px; border-radius: 20px;">⭐ ${soustitre || "PURGEUR D'ÉLITE"} ⭐</div>
                            <div style="margin: 20px 0;">
                                <span style="background: ${couleurOr}; color: black; padding: 5px 15px; border-radius: 15px; font-size: 12px; margin: 0 5px;">🔴 BAN</span>
                                <span style="background: ${couleurOr}; color: black; padding: 5px 15px; border-radius: 15px; font-size: 12px; margin: 0 5px;">💀 SPAM</span>
                            </div>
                            <div style="font-size: 28px; font-weight: bold; color: ${couleurOr}; margin: 15px 0;">${stats || "10000 LVL 1"}</div>
                            <div style="border-top: 1px solid ${couleurOr}; margin: 20px 0; padding-top: 10px;">
                                <div style="font-size: 11px; color: ${couleurOr};">🏅 DÉCERNÉ PAR INFO PURGE 24 🏅</div>
                                <div style="font-size: 10px; color: ${couleurOr}; margin-top: 5px;">"Le respect ne se demande pas" - Joyboy</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('resultat').innerHTML = `
                <div style="text-align: center;">
                    <div class="design-preview">
                        ${designHTML}
                    </div>
                    <div>
                        <button class="btn-save" onclick="sauvegarderDesign()">💾 Sauvegarder</button>
                        <button class="btn-download" onclick="telechargerDesign()">📥 Télécharger</button>
                    </div>
                </div>
            `;
            
            window.designActuel = { type, nom, soustitre, couleur, stats, html: designHTML };
        }
        
        function sauvegarderDesign() {
            if(!window.designActuel) return;
            const id = Date.now();
            const design = {
                id: id,
                type: window.designActuel.type,
                nom: window.designActuel.nom,
                html: window.designActuel.html,
                date: new Date().toLocaleString()
            };
            designsSauvegardes.push(design);
            localStorage.setItem('purge_designs', JSON.stringify(designsSauvegardes));
            afficherGalerie();
            alert("✅ Design sauvegardé !");
        }
        
        function telechargerDesign() {
            const designElement = document.querySelector('.design-preview');
            if(designElement) {
                html2canvas(designElement).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'purge-design.png';
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }
        }
        
        function afficherGalerie() {
            const grid = document.getElementById('gallery-grid');
            if(designsSauvegardes.length === 0) {
                grid.innerHTML = '<p style="color: #666;">Aucune création sauvegardée</p>';
                return;
            }
            grid.innerHTML = designsSauvegardes.map(design => `
                <div class="gallery-card" onclick="restaurerDesign(${design.id})">
                    <div style="background: #1a0000; border-radius: 8px; padding: 10px;">
                        <div style="font-size: 30px;">${design.type === 'banniere_clan' ? '🏆' : design.type === 'carte_purgeur' ? '👑' : design.type === 'fleur_sombre' ? '🌸' : design.type === 'recompense_premium' ? '🏅' : '📰'}</div>
                        <div style="font-size: 12px; margin-top: 5px;">${design.nom}</div>
                    </div>
                    <div style="font-size: 10px; margin: 5px 0;">${design.date}</div>
                    <button class="delete-btn" onclick="event.stopPropagation(); supprimerDesign(${design.id})">🗑 Supprimer</button>
                </div>
            `).join('');
        }
        
        function restaurerDesign(id) {
            const design = designsSauvegardes.find(d => d.id === id);
            if(design) {
                document.getElementById('resultat').innerHTML = `
                    <div style="text-align: center;">
                        <div class="design-preview">
                            ${design.html}
                        </div>
                        <div>
                            <button class="btn-download" onclick="telechargerDesign()">📥 Télécharger</button>
                        </div>
                    </div>
                `;
            }
        }
        
        function supprimerDesign(id) {
            designsSauvegardes = designsSauvegardes.filter(d => d.id !== id);
            localStorage.setItem('purge_designs', JSON.stringify(designsSauvegardes));
            afficherGalerie();
        }
        
        const saved = localStorage.getItem('purge_designs');
        if(saved) {
            designsSauvegardes = JSON.parse(saved);
            afficherGalerie();
        }
    </script>
</body>
</html>
